document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n  --cf-midnight-05: rgba(4, 14, 61, 0.05);\n\n  /* ---------- 2. Semantic color tokens ---------- */\n\n  /* Foreground */\n  --fg-primary:       var(--cf-midnight-blue);\n  --fg-secondary:     var(--cf-midnight-70);\n  --fg-tertiary:      var(--cf-midnight-50);\n  --fg-on-dark:       var(--cf-white);\n  --fg-on-dark-soft:  rgba(255, 255, 255, 0.72);\n  --fg-accent:        var(--cf-purple);\n  --fg-danger:        var(--cf-callout-red);\n\n  /* Background */\n  --bg-page:          var(--cf-white);\n  --bg-surface:       var(--cf-white);\n  --bg-subtle:        var(--cf-crisp-grey);\n  --bg-inverse:       var(--cf-midnight-blue);\n  --bg-inverse-2:     #0A1855;       /* a half-step lighter for inverse cards */\n\n  /* Borders */\n  --border-subtle:    var(--cf-midnight-10);\n  --border-strong:    var(--cf-midnight-20);\n  --border-on-dark:   rgba(255, 255, 255, 0.12);\n\n  /* States */\n  --state-hover-overlay: var(--cf-midnight-05);\n  --state-press-overlay: var(--cf-midnight-10);\n  --focus-ring:       var(--cf-utility-blue);\n\n  /* ---------- 3. Brand gradients ---------- */\n  /* \"Vibrant\" — Bright Green → Bright Blue. Best on midnight background. */\n  --gradient-vibrant: linear-gradient(90deg, #8FFFDB 0%, #71F1F7 100%); /* @kind color */\n\n  /* \"Calm\" — Utility Blue → Bright Blue. Cool cyan family, best for gradient text on light. */\n  --gradient-calm: linear-gradient(90deg, #2CB0CD 0%, #71F1F7 100%); /* @kind color */\n\n  /* \"Storm\" — radial glow of Purple + Lavender + Utility Blue on Midnight base.\n     Use as a panel/shape background, not a flat linear sweep. */\n  --gradient-storm: radial-gradient(ellipse 80% 90% at 50% 40%, #6400EC 0%, #2CB0CD 30%, #0A1855 70%, #040E3D 100%); /* @kind color */\n  /* Linear fallback variant for hero sections that need full-bleed coverage */\n  --gradient-storm-linear: linear-gradient(135deg, #040E3D 0%, #6400EC 55%, #2CB0CD 100%); /* @kind color */\n\n  /* Subtle midnight wash for inverse hero sections */\n  --gradient-midnight-wash: linear-gradient(180deg, #040E3D 0%, #0A1855 100%); /* @kind color */\n\n  /* ---------- 4. Typography ---------- */\n  --font-sans: \"DM Sans\", -apple-system, BlinkMacSystemFont,\n               \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n  --font-mono: \"DM Mono\", \"SF Mono\", ui-monospace, Menlo, Consolas, monospace;\n\n  /* Weights — brand uses Bold for titles, Regular for body */\n  --fw-regular: 400; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n\n  /* Tracking\n     The deck guide calls out \"Very Loose Character Spacing\" for ALL CAPS subtitles.\n     PowerPoint's Very Loose ≈ 0.25em letter-spacing. */\n  --tracking-tight: -0.01em; /* @kind font */\n  --tracking-normal: 0; /* @kind font */\n  --tracking-wide: 0.08em; /* @kind font */\n  --tracking-very-loose: 0.25em; /* @kind font */   /* brand-spec eyebrow / subtitle */\n\n  /* Line heights */\n  --lh-tight: 1.05; /* @kind font */\n  --lh-snug: 1.2; /* @kind font */\n  --lh-normal: 1.45; /* @kind font */\n  --lh-loose: 1.6; /* @kind font */\n\n  /* Type scale — slide deck baseline is 24px body, 48px title.\n     Web scale is normalized to a 16px root. */\n  --fs-display:   clamp(56px, 7vw, 96px); /* @kind font */  /* hero on web */\n  --fs-h1:        48px;                     /* slide title spec */\n  --fs-h2:        36px;\n  --fs-h3:        28px;\n  --fs-h4:        22px;\n  --fs-body-lg:   24px;                     /* slide body spec */\n  --fs-body:      18px;                     /* web body */\n  --fs-body-sm:   16px;\n  --fs-eyebrow:   16px;                     /* slide subtitle spec */\n  --fs-caption:   13px;\n\n  /* ---------- 5. Spacing (4-pt grid) ---------- */\n  --sp-0: 0; /* @kind spacing */\n  --sp-1: 4px;\n  --sp-2: 8px;\n  --sp-3: 12px;\n  --sp-4: 16px;\n  --sp-5: 24px;\n  --sp-6: 32px;\n  --sp-7: 48px;\n  --sp-8: 64px;\n  --sp-9: 96px;\n  --sp-10: 128px;\n\n  /* ---------- 6. Radius ---------- */\n  --r-sm: 4px;\n  --r-md: 8px;\n  --r-lg: 14px;\n  --r-xl: 24px;\n  --r-pill: 999px;\n\n  /* ---------- 7. Shadow & elevation ---------- */\n  /* Brand visuals are largely flat. Shadows are subtle, cool-tinted (midnight). */\n  --shadow-1: 0 1px 2px rgba(4, 14, 61, 0.06), 0 1px 1px rgba(4, 14, 61, 0.04);\n  --shadow-2: 0 4px 12px rgba(4, 14, 61, 0.08), 0 1px 2px rgba(4, 14, 61, 0.04);\n  --shadow-3: 0 12px 32px rgba(4, 14, 61, 0.12), 0 4px 8px rgba(4, 14, 61, 0.06);\n  --shadow-glow-green: 0 0 32px rgba(143, 255, 219, 0.45);\n  --shadow-glow-blue:  0 0 32px rgba(113, 241, 247, 0.40);\n\n  /* ---------- 8. Motion ---------- */\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n  --ease-emphasized: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 200ms; /* @kind other */\n  --dur-slow: 360ms; /* @kind other */\n}\n\n/* ---------- 9. Element defaults ---------- */\nhtml { font-family: var(--font-sans); color: var(--fg-primary); background: var(--bg-page); }\nbody { margin: 0; font-size: var(--fs-body); line-height: var(--lh-normal); -webkit-font-smoothing: antialiased; }\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-bold);\n  color: var(--fg-primary);\n  line-height: var(--lh-tight);\n  margin: 0;\n  letter-spacing: var(--tracking-tight);\n}\nh1 { font-size: var(--fs-h1); }\nh2 { font-size: var(--fs-h2); }\nh3 { font-size: var(--fs-h3); }\nh4 { font-size: var(--fs-h4); }\n\np, li { color: var(--fg-secondary); line-height: var(--lh-normal); }\n\n/* Brand eyebrow — ALL CAPS, very loose tracking, bold, midnight */\n.cf-eyebrow {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-eyebrow);\n  letter-spacing: var(--tracking-very-loose);\n  text-transform: uppercase;\n  color: var(--fg-primary);\n  display: inline-block;\n}\n\n/* Gradient text helpers */\n.cf-text-vibrant {\n  background: var(--gradient-vibrant);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.cf-text-calm {\n  background: var(--gradient-calm);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n\n/* Selection */\n::selection { background: var(--cf-bright-green); color: var(--cf-midnight-blue); }\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { height: 100%; }\n  body {\n    font-family: var(--font-sans);\n    background: #02081F;\n    color: #fff;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n    overflow: hidden;\n  }\n\n  /* ---------- scaling stage ---------- */\n  #viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }\n  #stage {\n    width: 1440px; height: 810px; position: relative; flex: none;\n    transform-origin: center center;\n    background: var(--cf-midnight-blue);\n    background-image:\n      radial-gradient(ellipse 70% 70% at 88% -8%, rgba(100,0,236,0.50) 0%, rgba(44,176,205,0.20) 38%, rgba(4,14,61,0) 70%),\n      radial-gradient(ellipse 60% 60% at -6% 108%, rgba(143,255,219,0.12) 0%, transparent 60%);\n    overflow: hidden;\n  }\n  #stage::after {\n    content: \"\"; position: absolute; inset: 0; pointer-events: none;\n    background: radial-gradient(ellipse 120% 80% at 50% 120%, rgba(34,227,108,0.07) 0%, transparent 55%);\n  }\n\n  /* ---------- header ---------- */\n  .head { position: absolute; top: 52px; left: 70px; right: 70px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 3; }\n  .head .logo img { height: 22px; display: block; }\n  .eyebrow { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--cf-bright-green); margin-bottom: 13px; }\n  .head h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.0; color: #fff; }\n  .head h1 .g { background: var(--gradient-vibrant); -webkit-background-clip: text; background-clip: text; color: transparent; }\n  .head h1 .dot { color: var(--cf-callout-green); }\n  .head .sub { font-size: 13.5px; line-height: 1.45; color: rgba(255,255,255,0.72); max-width: 560px; margin-top: 12px; }\n  .head .meta { text-align: right; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.5); line-height: 1.9; }\n  .head .meta .chip { display: inline-block; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; padding: 5px 12px; margin-bottom: 12px; color: rgba(255,255,255,0.72); white-space: nowrap; }\n  .head .meta .hint { display: flex; align-items: center; gap: 7px; justify-content: flex-end; color: var(--cf-bright-green); }\n  .head .meta .hint svg { width: 12px; height: 12px; }\n\n  /* ---------- phase brackets ---------- */\n  .phases { position: absolute; left: 70px; right: 70px; top: 270px; height: 46px; display: grid; grid-template-columns: repeat(10, 1fr); z-index: 2; }\n  .phase { position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 9px; }\n  .phase .pl { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; white-space: nowrap; }\n  .phase .pw { font-family: var(--font-mono); font-size: 9px; font-weight: 400; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); margin-top: 3px; }\n  .phase::before { content: \"\"; position: absolute; left: 8px; right: 8px; bottom: 0; height: 1px; background: currentColor; opacity: 0.4; }\n  .phase::after { content: \"\"; position: absolute; bottom: 0; left: 8px; width: 1px; height: 7px; background: currentColor; opacity: 0.4; }\n  .phase.build { color: var(--cf-bright-blue); }\n  .phase.p1 { color: var(--cf-bright-green); }\n  .phase.p2 { color: var(--cf-lavender); }\n  .phase.conv { color: var(--cf-utility-blue); }\n\n  /* ---------- timeline rail ---------- */\n  .rail { position: absolute; left: 70px; right: 70px; top: 334px; height: 300px; z-index: 2; }\n  .spine { position: absolute; left: 0; right: 0; top: 150px; height: 5px; border-radius: 3px;\n    background: linear-gradient(90deg, #F65275 0%, #9B3FD6 22%, #6400EC 33%, #2CB0CD 52%, #22E36C 66%, #71F1F7 82%, #8FFFDB 100%);\n    opacity: 0.85; }\n  .spine-cap { position: absolute; top: 147px; width: 11px; height: 11px; border-radius: 50%; }\n  .spine-cap.start { left: -2px; background: #F65275; }\n  .spine-cap.end { right: -2px; background: #8FFFDB; box-shadow: 0 0 16px rgba(143,255,219,0.8); }\n\n  .nodes { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(10, 1fr); }\n  .stagebtn { position: relative; background: none; border: none; cursor: pointer; font-family: inherit; color: inherit; padding: 0; height: 100%; }\n  .stagebtn .dot {\n    position: absolute; left: 50%; top: 150px; transform: translate(-50%, -50%);\n    width: 54px; height: 54px; border-radius: 50%;\n    background: #0A1330; border: 3px solid var(--c);\n    display: flex; align-items: center; justify-content: center;\n    font-family: var(--font-mono); font-size: 17px; font-weight: 500; color: #fff;\n    transition: transform var(--dur-base) var(--ease-standard), box-shadow var(--dur-base) var(--ease-standard);\n    z-index: 2;\n  }\n  .stagebtn.key .dot { background: var(--c); color: #04122A; font-weight: 700; box-shadow: 0 0 22px color-mix(in oklab, var(--c) 65%, transparent); }\n  .stagebtn.dashed .dot { border-style: dashed; }\n  .stagebtn.dashed.key .dot { border-color: rgba(4,18,42,0.85); }\n  .stagebtn:hover .dot, .stagebtn:focus-visible .dot { transform: translate(-50%, -50%) scale(1.13); box-shadow: 0 0 26px color-mix(in oklab, var(--c) 75%, transparent); }\n  .stagebtn:focus-visible { outline: none; }\n  .stagebtn:focus-visible .dot { outline: 2px solid #fff; outline-offset: 3px; }\n\n  .lab { position: absolute; left: 50%; transform: translateX(-50%); width: 138px; text-align: center; pointer-events: none; }\n  .lab .lt { font-size: 14.5px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.12; color: #fff; }\n  .lab .lc { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.04em; line-height: 1.35; color: rgba(255,255,255,0.55); margin-top: 5px; }\n  .lab.top { bottom: calc(100% - 150px + 44px); display: flex; flex-direction: column; justify-content: flex-end; }\n  .lab.bot { top: calc(150px + 44px); }\n  .stagebtn:hover .lab .lt, .stagebtn:focus-visible .lab .lt { color: var(--c); }\n  .stagebtn .conn { position: absolute; left: 50%; transform: translateX(-50%); width: 1px; background: rgba(255,255,255,0.18); }\n  .stagebtn .conn.top { bottom: calc(100% - 150px + 30px); height: 12px; }\n  .stagebtn .conn.bot { top: calc(150px + 30px); height: 12px; }\n\n  /* ---------- footer principle ---------- */\n  .principle { position: absolute; left: 70px; right: 70px; bottom: 46px; display: flex; align-items: center; gap: 22px; z-index: 2;\n    border-top: 1px solid rgba(255,255,255,0.14); padding-top: 18px; }\n  .principle .pkey { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cf-bright-green); white-space: nowrap; }\n  .principle .ptext { font-size: 14px; line-height: 1.45; color: rgba(255,255,255,0.82); }\n  .principle .ptext b { color: #fff; font-weight: 700; }\n  .principle .brandmark { margin-left: auto; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.4); white-space: nowrap; }\n\n  /* ---------- modal ---------- */\n  .scrim { position: fixed; inset: 0; background: rgba(2,6,18,0.72); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);\n    display: flex; align-items: center; justify-content: center; padding: 32px; z-index: 100;\n    opacity: 0; pointer-events: none; transition: opacity var(--dur-base) var(--ease-standard); }\n  .scrim.open { opacity: 1; pointer-events: auto; }\n  .modal {\n    width: 560px; max-width: 100%; max-height: 88vh; overflow: auto;\n    background: #0A1330; border: 1px solid rgba(255,255,255,0.14); border-radius: 20px;\n    box-shadow: 0 40px 100px rgba(0,0,0,0.6); position: relative;\n    transform: translateY(14px) scale(0.985); transition: transform var(--dur-base) var(--ease-emphasized);\n  }\n  .scrim.open .modal { transform: none; }\n  .modal::before { content: \"\"; position: absolute; top: 0; left: 0; right: 0; height: 5px; border-radius: 20px 20px 0 0; background: var(--c, #8FFFDB); }\n  .m-head { padding: 28px 30px 18px; display: flex; gap: 16px; align-items: flex-start; }\n  .m-num { flex: none; width: 46px; height: 46px; border-radius: 50%; border: 2.5px solid var(--c, #8FFFDB); background: rgba(255,255,255,0.04);\n    display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 16px; font-weight: 500; color: #fff; }\n  .m-head .m-tt { flex: 1; }\n  .m-stagetag { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--c, #8FFFDB); margin-bottom: 6px; }\n  .m-title { font-size: 25px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; color: #fff; }\n  .m-when { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); margin-top: 7px; }\n  .m-close { position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.18);\n    background: none; color: rgba(255,255,255,0.7); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--dur-fast); }\n  .m-close:hover { background: rgba(255,255,255,0.08); color: #fff; }\n  .m-close svg { width: 15px; height: 15px; }\n  .m-body { padding: 0 30px 8px; }\n  .m-summary { font-size: 14px; line-height: 1.55; color: rgba(255,255,255,0.82); }\n  .m-summary b { color: #fff; font-weight: rkflow, governance','Creates a natural reason for a follow-up conversation'] },\n\n  { n:'05', c:'#39D38C', key:false, title:'Outbound Activation', when:'Signal-driven outreach', pos:'bot', own:'support',\n    link:'',\n    summary:'<b>Sales-owned, signal-fuelled.<\u002Fb> Reps drive named accounts to the assessment, working from a list the Growth team builds and prioritises off live intent data.',\n    groups:[\n      { label:'Sales runs', own:'sales', items:['Outbound sequences into prioritised accounts','Reps reinforce the campaign narrative (1:1 social, personalised outreach)','Reply themes feed back into branch selection'] },\n      { label:'Growth team supports', own:'growth', items:['Build the target list from ICP + ZoomInfo intent surges','Score &amp; prioritise accounts spiking on relevant topics','Supply sequence copy, talk tracks and the assessment CTA'] }\n    ],\n    highlight:{ label:'Intent-qualified, not cold', text:'Every account here is showing <b>active buying signals<\u002Fb> in ZoomInfo before a rep reaches out. Surges on AI-readiness, agentic AI and IT-automation topics fast-track an account into the assessment offer.' } },\n\n  { n:'06', c:'#22E36C', key:true, title:'Branch Campaigns', when:'Targeted thought leadership', pos:'top', own:'lead',\n    link:'',\n    summary:'From week seven, <b>branch into function-specific plays<\u002Fb> based on demand signals. Same parent narrative, made specific to each buyer&rsquo;s function and pain points.',\n    listLabel:'Branch tracks (each gets its own resource)',\n    branches:[\n      { name:'Legal', angle:'AI readiness in Legal Service Delivery — matters, requests, contracts', link:'' },\n      { name:'Workplace / Facilities', angle:'Facilities, space, visitor and workplace service experiences', link:'' },\n      { name:'HR / Employee Services', angle:'Employee journeys, HR case management, service experience', link:'' },\n      { name:'Health, Safety & ESG', angle:'Safety incidents, compliance and ESG workflows', link:'' },\n      { name:'Cross-functional', angle:'Enterprise service management beyond IT', link:'' }\n    ] },\n\n  { n:'07', c:'#71F1F7', key:false, title:'Presales Review', when:'Value match', pos:'bot', own:'support',\n    link:'',\n    summary:'Convert assessment interest into a <b>qualified conversation<\u002Fb>: a presales review or roadmap workshop that turns a score into a plan.',\n    listLabel:'In this step',\n    list:['Review the assessment results with the buyer','Identify the highest-value readiness gaps','Shape a roadmap / workshop next step'],\n    highlight:{ label:'Conversation starter', text:'For accounts that meet <b>ICP<\u002Fb>, lead with a <b>free 1-hour AI Readiness Assessment<\u002Fb>. A low-friction way to turn the score into a working session and open the value conversation.' } },\n\n  { n:'08', c:'#A9F4E6', key:false, title:'Sales Opportunity', when:'Scope & propose', pos:'top', own:'support',\n    link:'',\n    summary:'Qualified pipeline. Map the <b>Crossfuze offers<\u002Fb> to the readiness gap and the stage the buyer needs to reach.',\n    listLabel:'Offer mapping',\n    list:['CoreEssentials — Foundation → Walk (~12 weeks)','Core RunState — Walk → Run (90-day cycles)','CBS Delivery — Run → Fly (bespoke outcomes)'] },\n\n  { n:'09', c:'#8FFFDB', key:true, title:'Refine & Amplify', when:'Improve the engine, prove the wins', pos:'bot', own:'lead',\n    link:'',\n    summary:'Feed performance data back into the engine and turn results into proof. <b>Refine messaging, assets and branches<\u002Fb>, then amplify what works through customer evidence.',\n    listLabel:'Refine &amp; amplify',\n    list:['Refine AEO, landing-page and campaign performance','Double down on the branches that convert','<b>Win Wires<\u002Fb> capturing why deals closed','<b>Customer Success Stories<\u002Fb> that feed the top of funnel'] }\n];\n\n/* ---------- build phase brackets ---------- */\nvar PHASES = [\n  { cls:'build', span:[0,2], label:'Build', when:'Prepare' },\n  { cls:'p1',    span:[3,5], label:'Phase 1 · General', when:'Weeks 1–6' },\n  { cls:'p2',    span:[6,6], label:'Phase 2 · Branch', when:'Week 7+' },\n  { cls:'conv',  span:[7,9], label:'Convert & Optimise', when:'Ongoing' }\n];\nvar phasesEl = document.getElementById('phases');\nPHASES.forEach(function(p){\n  var d = document.createElement('div');\n  d.className = 'phase ' + p.cls;\n  d.style.gridColumn = (p.span[0]+1) + ' / ' + (p.span[1]+2);\n  d.innerHTML = '<div class=\"pl\">' + p.label + '<\u002Fdiv><div class=\"pw\">' + p.when + '<\u002Fdiv>';\n  phasesEl.appendChild(d);\n});\n\n/* ---------- build nodes ---------- */\nvar nodesEl = document.getElementById('nodes');\nSTAGES.forEach(function(s, i){\n  var b = document.createElement('button');\n  var dashed = [5,7,8].indexOf(i) !== -1;\n  b.className = 'stagebtn' + (s.key ? ' key' : '') + (dashed ? ' dashed' : '');\n  b.style.setProperty('--c', s.c);\n  b.setAttribute('aria-label', 'Stage ' + s.n + ': ' + s.title);\n  b.dataset.idx = i;\n  var labClass = s.pos === 'top' ? 'top' : 'bot';\n  b.innerHTML =\n    '<div class=\"dot\">' + (i) + '<\u002Fdiv>' +\n    '<div class=\"conn ' + labClass + '\"><\u002Fdiv>' +\n    '<div class=\"lab ' + labClass + '\"><div class=\"lt\">' + s.title + '<\u002Fdiv><div class=\"lc\">' + s.when + '<\u002Fdiv><\u002Fdiv>';\n  b.addEventListener('click', function(){ openStage(i); });\n  nodesEl.appendChild(b);\n});\n\n/* ---------- modal logic ---------- */\nvar scrim = document.getElementById('scrim');\nvar modal = document.getElementById('modal');\nvar current = -1;\n\nfunction arrowSvg(){ return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17L17 7M9 7h8v8\"/><\u002Fsvg>'; }\nfunction chatSvg(){ return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"/><\u002Fsvg>'; }\n\nfunction openStage(i){\n  var s = STAGES[i];\n  current = i;\n  modal.style.setProperty('--c', s.c);\n  document.getElementById('mNum').textContent = i;\n  document.getElementById('mNum').style.borderColor = s.c;\n  document.getElementById('mTag').textContent = 'Stage ' + s.n;\n  document.getElementById('mTag').style.color = s.c;\n  document.getElementById('m-title').textContent = s.title;\n  document.getElementById('mWhen').textContent = s.when;\n\n  var body = '<p class=\"m-summary\">' + s.summary + '<\u002Fp>';\n  if (s.branches){\n    body += '<div class=\"m-seclab\">' + s.listLabel + '<\u002Fdiv><div class=\"branches\">';\n    s.branches.forEach(function(br){\n      var go = br.link\n        ? '<a class=\"bgo\" href=\"' + br.link + '\" target=\"_blank\" rel=\"noopener\">Open ' + arrowSvg() + '<\u002Fa>'\n        : '<span class=\"bgo disabled\">Soon<\u002Fspan>';\n      body += '<div class=\"branch\"><div><div class=\"bn\">' + br.name + '<\u002Fdiv><div class=\"ba\">' + br.angle + '<\u002Fdiv><\u002Fdiv>' + go + '<\u002Fdiv>';\n    });\n    body += '<\u002Fdiv>';\n  } else if (s.groups){\n    s.groups.forEach(function(g){\n      var gc = g.own === 'growth' ? ' lab-growth' : (g.own === 'sales' ? ' lab-sales' : '');\n      var mc = g.own === 'growth' ? ' mk-growth' : (g.own === 'sales' ? ' mk-sales' : '');\n      body += '<div class=\"m-seclab' + gc + '\">' + g.label + '<\u002Fdiv><ul class=\"m-list\">';\n      g.items.forEach(function(li){ body += '<li><span class=\"mk' + mc + '\"><\u002Fspan><span>' + li + '<\u002Fspan><\u002Fli>'; });\n      body += '<\u002Ful>';\n    });\n  } else if (s.list){\n    body += '<div class=\"m-seclab\">' + s.listLabel + '<\u002Fdiv><ul class=\"m-list\">';\n    s.list.forEach(function(li){ body += '<li><span class=\"mk\"><\u002Fspan><span>' + li + '<\u002Fspan><\u002Fli>'; });\n    body += '<\u002Ful>';\n  }\n  if (s.highlight){\n    body += '<div class=\"m-callout\"><div class=\"mc-tag\">' + chatSvg() + '<span>' + s.highlight.label + '<\u002Fspan><\u002Fdiv><div class=\"mc-text\">' + s.highlight.text + '<\u002Fdiv><\u002Fdiv>';\n  }\n  if (s.resources){\n    body += '<div class=\"m-seclab\">Resources<\u002Fdiv><div class=\"res-btns\">';\n    s.resources.forEach(function(r){\n      body += r.link\n        ? '<a class=\"res-btn\" href=\"' + r.link + '\" target=\"_blank\" rel=\"noopener\">' + r.name + ' ' + arrowSvg() + '<\u002Fa>'\n        : '<span class=\"res-btn disabled\">' + r.name + '<em>soon<\u002Fem><\u002Fspan>';\n    });\n    body += '<\u002Fdiv>';\n  }\n  document.getElementById('mBody').innerHTML = body;\n\n  var cta = document.getElementById('mCta');\n  if (s.link){\n    cta.href = s.link;\n    cta.classList.remove('pending');\n    cta.innerHTML = 'Continue to resource ' + arrowSvg();\n  } else {\n    cta.removeAttribute('href');\n    cta.classList.add('pending');\n    cta.innerHTML = 'Link coming soon';\n  }\n\n  scrim.classList.add('open');\n  document.getElementById('mClose').focus();\n}\nfunction closeModal(){ scrim.classList.remove('open'); current = -1; }\nfunction step(d){ if (current < 0) return; var n = current + d; if (n >= 0 && n < STAGES.length) openStage(n); }\n\ndocument.getElementById('mClose').addEventListener('click', closeModal);\ndocument.getElementById('mPrev').addEventListener('click', function(){ step(-1); });\ndocument.getElementById('mNext').addEventListener('click', function(){ step(1); });\nscrim.addEventListener('click', function(e){ if (e.target === scrim) closeModal(); });\ndocument.addEventListener('keydown', function(e){\n  if (e.key === 'Escape') closeModal();\n  else if (e.key === 'ArrowRight') step(1);\n  else if (e.key === 'ArrowLeft') step(-1);\n});\n\n/* ---------- scale stage to viewport ---------- */\nvar stageEl = document.getElementById('stage');\nfunction fit(){\n  var s = Math.min(window.innerWidth / 1440, window.innerHeight / 810);\n  stageEl.style.transform = 'scale(' + s + ')';\n}\nwindow.addEventListener('resize', fit);\nfit();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
