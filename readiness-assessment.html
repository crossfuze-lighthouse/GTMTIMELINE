document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

heir own house in order first.<\u002Fp>\n        <div class=\"path\">ITSM → CMDB → ITOM → ITAM → Now Assist → Autonomous workforce<\u002Fdiv>\n        <span class=\"go\">Benchmark IT →<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"tcard\" style=\"--tc:var(--cf-green)\" onclick=\"pick('B')\">\n        <span class=\"tk\">Track B<\u002Fspan>\n        <h3>Business Transformation<\u002Fh3>\n        <p>Extend ServiceNow beyond IT to every business function on one shared data model, unlocking cross-department automation and shared AI. For BU-led organisations.<\u002Fp>\n        <div class=\"path\">HR · Finance · Legal · Procurement · Facilities · Health &amp; Safety<\u002Fdiv>\n        <span class=\"go\">Benchmark the business →<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"track-note\">Both tracks start with the Center of Excellence, the foundation the whole curve rests on.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== BU SELECT (Track B) ===== -->\n<section id=\"buselect\" class=\"screen\">\n  <div class=\"wrap track-inner\">\n    <div class=\"topbar\"><span class=\"ey\">AI Readiness Benchmark<\u002Fspan><span class=\"ey\">Track B · Business Transformation<\u002Fspan><\u002Fdiv>\n    <div class=\"eyebrow\" style=\"margin-top:40px\">Focus your benchmark<\u002Fdiv>\n    <h2>Which two functions go first?<\u002Fh2>\n    <p class=\"sub\">CoreEssentials takes two business units live in twelve weeks. Choose the two you want to benchmark and build the plan around. The rest stay on the map to benchmark later.<\u002Fp>\n    <div class=\"bu-select\" id=\"buSelect\"><\u002Fdiv>\n    <div class=\"intro-cta\" style=\"margin-top:34px\">\n      <button class=\"btn\" id=\"buGo\" disabled=\"\" onclick=\"confirmBUs()\">Benchmark these two →<\u002Fbutton>\n      <span class=\"intro-note\" id=\"buCount\">Select up to 2<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== ASSESSMENT ===== -->\n<section id=\"assess\" class=\"sc  class=\"snap-left\"><div class=\"eyebrow\">02 — Snapshot<\u002Fdiv><h2 class=\"snap-h\">Your readiness snapshot<\u002Fh2><p class=\"snap-p\" id=\"snapText\"><\u002Fp><\u002Fdiv>\n      <div class=\"stat-row\" id=\"statrow\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n    <div class=\"rband\"><div class=\"wrap\">\n    <div class=\"sec-h\"><div class=\"eyebrow\">03 — Where you stand<\u002Fdiv><h3>Your maturity, by business unit<\u002Fh3><p>Every unit climbs the same curve. The value line is where AI starts to pay back.<\u002Fp><\u002Fdiv>\n    <div class=\"bu-card\">\n      <div class=\"cc-head\"><div class=\"eyebrow\">The maturity curve<\u002Fdiv><div class=\"leg\"><i>- - -<\u002Fi> Otto value line · value lands above it<\u002Fdiv><\u002Fdiv>\n      <svg class=\"bucurve\" id=\"buchart\" viewBox=\"0 0 900 400\" xmlns=\"http://www.w3.org/2000/svg\"><\u002Fsvg>\n      <div class=\"bu-grid\" id=\"bugrid\"><\u002Fdiv>\n      <div class=\"bu-readout\" id=\"buReadout\"><\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><\u002Fdiv>\n    <div class=\"rband\"><div class=\"wrap\">\n    <div class=\"sec-h\"><div class=\"eyebrow\">04 — Capability scores<\u002Fdiv><h3>Readiness across the four pillars<\u002Fh3><p>Where you are strong and where you are exposed, across the four pillars the CoE governs: data, workflows, AI and governance.<\u002Fp><\u002Fdiv>\n    <div class=\"pillars\" id=\"pillars\"><\u002Fdiv>\n    <div class=\"caplad-h\">How capability matures across the curve<\u002Fdiv>\n    <div class=\"caplad\" id=\"capLadder\"><\u002Fdiv>\n\n  <\u002Fdiv><\u002Fdiv>\n    <div class=\"rband alt\"><div class=\"wrap\">\n    <div class=\"sec-h\"><div class=\"eyebrow\">05 — The opportunity<\u002Fdiv><h3>What twelve weeks could do<\u002Fh3><p>A 12-week CoreEssentials engagement moves you up the curve. Here is how far.<\u002Fp><\u002Fdiv>\n    <div class=\"impact-card\">\n      <div class=\"ic-top\"><div class=\"eyebrow\">Projected uplift<\u002Fdiv><div class=\"move\" id=\"impactmove\"><\u002Fdiv><\u002Fdiv>\n      <svg class=\"curve\" id=\"impactcurve\" viewBox=\"0 0 900 320\" xmlns=\"http://www.w3.org/2000/svg\"><\u002Fsvg>\n    <\u002Fdiv>\n    <div class=\"bridge\" id=\"bridge\"><\u002Fdiv>\n\n  <\u002Fdiv><\u002Fdiv>\n    <div class=\"rband cta-band\"><div class=\"wrap\">\n    <div class=\"r-cta\">\n      <h3 id=\"ctah\"><\u002Fh3>\n      <p id=\"ctap\"><\u002Fp>\n      <div class=\"row\">\n        <button class=\"btn\" onclick=\"alert('Wire to your booking link / HubSpot meeting before go-live.')\">Book a call to discuss your results<\u002Fbutton>\n        <button class=\"btn btn-ghost\" onclick=\"openPrint()\">Download a printable summary<\u002Fbutton>\n        <button class=\"btn btn-ghost\" onclick=\"restart()\" style=\"opacity:.7\">Start over<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n    <div class=\"wrap foot-wrap\">\n    <div class=\"foot\" style=\"display:flex;flex-direction:column;align-items:center;gap:14px\"><img class=\"foot-logo\" src=\"35c8b81f-45a3-49d5-9285-f7c8699ce110\" alt=\"Crossfuze\"><img class=\"logo-sm\" src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAArAAAAB4CAYAAAAKYMFGAADMmklEQVR4nOydeZycRZ3/39+qp7vnyAkkEJBTApqAV/DWTXBRAfF2RlddxZ+aeMKKeLtMjwfqsqioqMmqoK6uO+OuN+DJxANFietB4hHu+wqBXDPdz/PU9/dHVU0/05mjJ5mEoP3J60n3PP0cVfXUU/Wp7wmtQDEoomAUkrAJ+P+UHqt9mOVKgi5P0L6kZ0DLr7xIO/r6NJngqoKGLaAPTX738tu7ewbUXrVyZUlZMkv3e9wcXb48CceaMdtehQo9A9bXD6NQUejo68Ogy5OVK1eWroISil2iS8qrdXWpb0DLO18GQfsMfWpoVJ2Vy7S08iotLffXT1BKy3V5ogMDdvVqLR19gVZAS1fTV1Yo+/vu7TZoo4022mijGaoqqioT7S9sJuw38XsbbbSxa9jphRsXimBQ9WTTACrgUATpE6hy+fIhc8QKkt9U706rYDfQmyH+mAv47mP+wLZHZMw67gC6j55N5cAEg8Fu30F9o2Kv2Z/aHwa46qpfyVvvBbjgkksq955ypS7t3ZD3XHedYd26XPz9ZaAXXTCInAjZHmuZnRtBAEElDlN2sAftHfA/qiBwYAfnv93Jr35VZ3AwB+GCbe7RWzryJc66h1ZceiQmO8hSsnXknq0kG12e3HTYDja+6TJ+T6/cDypXfXtd57Lz3+pYuMIxUM2qwNKlg8ngBvLBvl6lCiroIJheyPdeG7TRRhtttFFEgbhK2BxRtjN2jjUikgXiqgAionuzrG208beElgisMkbSpwJKX1/YV4V+uORoSo8+8o7k20ceVF+1RtK++/r222/uE14gdL5 on class=\"btn\" id=\"printgo\" onclick=\"submitPrint()\">Generate summary<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ===== STAGES ===== */\nconst STAGES=[\n {n:\"01\",name:\"Foundation\",color:\"var(--cf-lavender)\",hex:\"#C0A6FF\",ink:\"#3A2A6B\",goal:\"The ground AI is built on.\"},\n {n:\"02\",name:\"Crawl\",color:\"var(--cf-util)\",hex:\"#2CB0CD\",ink:\"#0C3F49\",goal:\"AI proven in one place.\"},\n {n:\"03\",name:\"Walk\",color:\"var(--cf-blue)\",hex:\"#71F1F7\",ink:\"#0A3D52\",goal:\"AI scaled across the business.\"},\n {n:\"04\",name:\"Run\",color:\"var(--cf-green)\",hex:\"#8FFFDB\",ink:\"#0B5740\",goal:\"AI orchestrated with oversight.\"},\n {n:\"05\",name:\"Fly\",color:\"var(--cf-spring)\",hex:\"#22E36C\",ink:\"#0A4A24\",goal:\"AI running the enterprise.\"},\n];\nconst VALUE_LINE=2, CLEAR=0.7;\nconst yLabels=[\"Ad Hoc\",\"Manual\",\"Un-Siloed\",\"End-to-End\",\"Autonomous\"];\n\n/* ===== CRITERIA (5 per stage, per track) ===== */\nconst CRIT={\n A:[\n  [[\"A Center of Excellence is in place: a standing body (executive sponsor and platform owner) holding the four pillars (data, workflows, AI, governance)\",\"\",\"governance\"],[\"CMDB, Knowledge Base, Catalog reviewed, de-duplicated and aligned to business services\",\"\",\"data\"],[\"CSDM adoption validated for service definitions in scope\",\"\",\"data\"],[\"Running supported Now Platform release with AI-relevant plugins installed\",\"\",\"ai\"],[\"Initial AI governance defined, incl. risk assessment and human-in-the-loop policies\",\"\",\"governance\"],[\"Clear success metrics and KPIs defined for first AI capability\",\"\",\"governance\"],[\"Key stakeholders (IT, business, compliance, change) aligned on goals and scope\",\"\",\"governance\"]],\n  [[\"One successful AI capability deployed (e.g. summarization or triage)\",\"\",\"ai\"],[\"Fulfillers have provided feedback loops for improving predictions\",\"\",\"workflows\"],[\"Team understands how to monitor AI performance and make corrections\",\"\",\"governance\"],[\"Adoption and user trust in AI tools are rising within the workflow\",\"\",\"workflows\"],[\"Governance structure in place for expanding to a second workflow\",\"\",\"governance\"],[\"AI Control Tower tracking basic performance metrics\",\"\",\"governance\"]],\n  [[\"AI capabilities used across 2–3 workflows (e.g. ITSM, HR, CSM)\",\"\",\"workflows\"],[\"LLM-powered Virtual Agent in production and receiving high ratings\",\"\",\"ai\"],[\"KPIs show measurable productivity gains or experience improvements\",\"\",\"governance\"],[\"Teams trained to manage and evaluate AI models\",\"\",\"ai\"],[\"Growing demand from business units to automate further\",\"\",\"workflows\"],[\"AI Agents piloted with human oversight in at least one use case\",\"\",\"ai\"],[\"AI Control Tower actively tracking performance across multiple workflows\",\"\",\"governance\"]],\n  [[\"AI Agents acting autonomously with audit and oversight in place\",\"\",\"ai\"],[\"AI Control Tower actively used for monitoring performance and policy\",\"\",\"governance\"],[\"ServiceNow AI integrated with external systems and orchestration layers\",\"\",\"workflows\"],[\"Support teams routinely co-work with AI, not just supervise it\",\"\",\"workflows\"],[\"Executive leadership supports scaling AI to all remaining workflows\",\"\",\"governance\"],[\"Agentic Workflows executing multi-step tasks without manual intervention\",\"\",\"workflows\"],[\"Now Assist Skill Kit deployed for workflow-specific customizations\",\"\",\"ai\"]],\n  [[\"AI fully embedded across all enterprise workflows\",\"\",\"workflows\"],[\"Agentic Workflows proactively identifying and resolving issues\",\"\",\"workflows\"],[\"Now Assist autonomously creating and maintaining knowledge content\",\"\",\"data\"],[\"AI Control Tower functioning as comprehensive digital operations center\",\"\",\"governance\"],[\"Teams focused on innovation rather than operational execution\",\"\",\"workflows\"],[\"Measurable business outcomes from AI optimization and automation\",\"\",\"governance\"]]\n ]\n};\nfunction toFunc(s){return s.replace(/Agentic Workflows/g,'\\u00A7AW\\u00A7').replace(/workflows/g,'functions').replace(/workflow/g,'function').replace(/ITSM, HR, CSM/g,'HR, Finance, Legal').replace(/\\u00A7AW\\u00A7/g,'Agentic Workflows');}\nCRIT.B = CRIT.A.map((st,si)=> si===0 ? st : st.map(c=>[toFunc(c[0]),c[1],c[2]]));\n\nconst CAP=[\n {assist:\"Plugins installed; platform readied for basic skills\",act:\"Not yet. Platform readiness only\",govern:\"Installed &amp; configured; initial governance policies set\"},\n {assist:\"Summarisation + AI Search for classification / routing in one workflow\",act:\"Not yet. Focus on basic Now Assist\",govern:\"Monitoring basic performance; collecting feedback\"},\n {assist:\"Generation &amp; recommendation across 2&ndash;3 workflows; Virtual Agent live\",act:\"Explore AI agents with human oversight; pilot simple tasks\",govern:\"Mature monitoring; policies for reviewing AI decisions\"},\n {assist:\"Skill Kit customisation; Now Assist integrated across workflows\",act:\"Agents triage, assign and resolve; multi-step automation live\",govern:\"Central hub: transparency, monitoring, policy; oversees autonomy\"},\n {assist:\"Embedded enterprise-wide; creates &amp; maintains knowledge\",act:\"Agents preempt and resolve issues, optimise outcomes autonomously\",govern:\"Digital operations centre; continuous tuning and optimisation\"},\n];\nconst TRACK={A:{label:\"Track A &middot; Autonomous IT\",noun:\"IT estate\",unit:\"core workflows\",book:\"two BUs\"},\n             B:{label:\"Track B &middot; Business Transformation\",noun:\"business functions\",unit:\"functions\",book:\"two BUs\"}};\n\n/* ===== STATE ===== */\nlet track='A';\nlet revealedUpTo=0, mappedAll=false;\nlet ansF=Array(5).fill(null);   // shared Foundation (CoE / platform)\nlet ansU={};                    // per-unit answers for stages 1..4: ansU[code]=[s1,s2,s3,s4]\nfunction units(){ return (selectedBUs&&selectedBUs.length)?selectedBUs:['IT']; }\nfunction storeFor(unit,si){ return si===0?ansF:ansU[unit][si-1]; }\nfunction initAnswers(){ ansF=Array(CRIT[track][0].length).fill(null); ansU={}; units().forEach(u=>{ansU[u]=[1,2,3,4].map(si=>Array(CRIT[track][si].length).fill(null));}); }\nfunction uStageComplete(u,si){const a=storeFor(u,si),v=a.filter(x=>x!==null);if(!v.length)return 0;return v.reduce((x,y)=>x+y,0)/(2*a.length);}\nfunction uStageFull(u,si){return storeFor(u,si).every(x=>x!==null);}\nfunction uStageClear(u,si){return uStageFull(u,si)&&uStageComplete(u,si)>=CLEAR;}\nfunction unitLevel(u){let c=-1;for(let i=0;i<STAGES.length;i++){if(uStageClear(u,i))c=i;else break;}return c;}\nfunction stageClearedAll(si){return units().every(u=>uStageClear(u,si));}\nfunction stageFullAll(si){return units().every(u=>uStageFull(u,si));}\n\nfunction pick(t){ track=t;\n if(t==='B'){ selectedBUs=[]; renderBUSelect(); show('buselect'); }\n else { selectedBUs=['IT']; startAssess(); }\n}\nfunction startAssess(){ initAnswers(); buildStages(); document.getElementById('trackpill').innerHTML=TRACK[track].label; refresh(); show('assess'); }\nfunction confirmBUs(){ if(!selectedBUs.length) return; startAssess(); }\nfunction renderBUSelect(){\n const fns=ENT_UNITS.filter(u=>u.code!=='IT');\n document.getElementById('buSelect').innerHTML=fns.map(u=>`<button class=\"buopt\" data-code=\"${u.code}\" style=\"--tc:${u.hex}\" onclick=\"toggleBU('${u.code}',this)\"><span class=\"bo-check\">\\u2713<\u002Fspan><span class=\"bdg\" style=\"background:${u.hex};color:${u.dark?'#fff':'#06121f'}\">${u.code}<\u002Fspan><div class=\"bo-t\">${u.name}<\u002Fdiv><div class=\"bo-d\">${u.desc}<\u002Fdiv><\u002Fbutton>`).join('');\n updateBUUI();\n}\nfunction toggleBU(code){\n const i=selectedBUs.indexOf(code);\n if(i>=0) selectedBUs.splice(i,1);\n else { if(selectedBUs.length>=2) return; selectedBUs.push(code); }\n updateBUUI();\n}\nfunction updateBUUI(){\n document.querySelectorAll('.buopt').forEach(b=>{const on=selectedBUs.includes(b.dataset.code);b.classList.toggle('on',on);b.classList.toggle('dim',selectedBUs.length>=2&&!on);});\n document.getElementById('buGo').disabled=selectedBUs.length===0;\n document.getElementById('buCount').textContent=selectedBUs.length?selectedBUs.length+' of 2 selected':'Select up to 2';\n}\n\nfunction segHTML(unit,si,ci){return `<div class=\"seg\" data-u=\"${unit}\" data-s=\"${si}\" data-c=\"${ci}\"><button data-v=\"2\" onclick=\"setv('${unit}',${si},${ci},2,this)\">In place<\u002Fbutton><button data-v=\"1\" onclick=\"setv('${unit}',${si},${ci},1,this)\">Partly<\u002Fbutton><button data-v=\"0\" onclick=\"setv('${unit}',${si},${ci},0,this)\">Not yet<\u002Fbutton><\u002Fdiv>`;}\nfunction buildStages(){\n const host=document.getElementById('stages');\n buildStepper();\n revealedUpTo=0; mappedAll=false;\n const gc=document.getElementById('gapcard'); if(gc) gc.style.display='none';\n const us=units(), multi=us.length>1;\n host.innerHTML=STAGES.map((s,si)=>{\n  const shared=si===0;\n  const crit=CRIT[track][si].map((c,ci)=>{\n   let ctrl;\n   if(shared){ ctrl=segHTML('_',si,ci); }\n   else if(multi){ ctrl='<div class=\"segs\">'+us.map(u=>{const h=ENT_UNITS.find(x=>x.code===u);return `<div class=\"segrow\"><span class=\"bu\" style=\"--bc:${h.hex};color:${h.dark?'#fff':'#06121f'}\">${h.name}<\u002Fspan>${segHTML(u,si,ci)}<\u002Fdiv>`;}).join('')+'<\u002Fdiv>'; }\n   else { ctrl=segHTML(us[0],si,ci); }\n   return `<div class=\"crit${(!shared&&multi)?' crit-multi':''}\"><div class=\"lbl\">${c[1]?('<b>'+c[0]+'<\u002Fb><span class=\"q\">'+c[1]+'<\u002Fspan>'):('<span class=\"stmt\">'+c[0]+'<\u002Fspan>')}<\u002Fdiv>${ctrl}<\u002Fdiv>`;\n  }).join('');\n  const denom=shared?CRIT[track][si].length:CRIT[track][si].length*us.length;\n  const goal=shared?'Shared foundation \\u00b7 your CoE &amp; platform':s.goal;\n  return `<div class=\"stage-block${si>0?' locked':''}\" data-si=\"${si}\" style=\"--st:${s.color};--st-ink:${s.ink}\">\n   <div class=\"stage-bar\"><span class=\"stage-num\">${s.n}<\u002Fspan><span class=\"stage-name\">${s.name}<\u002Fspan><span class=\"stage-goal\">${goal}<\u002Fspan><span class=\"stage-count\" id=\"sc${si}\">0/${denom}<\u002Fspan><\u002Fdiv>\n   <div class=\"criteria\">${crit}<\u002Fdiv><\u002Fdiv>`;\n }).join('');\n}\nfunction updateStageCount(si){\n const us=units();let n=0,d;\n if(si===0){n=ansF.filter(x=>x!==null).length;d=CRIT[track][0].length;}\n else{us.forEach(u=>n+=storeFor(u,si).filter(x=>x!==null).length);d=CRIT[track][si].length*us.length;}\n const el=document.getElementById('sc'+si);if(el)el.textContent=n+'/'+d;\n}\nfunction setv(unit,si,ci,v,btn){\n storeFor(unit,si)[ci]=v;\n const seg=btn.parentNode; seg.querySelectorAll('button').forEach(b=>b.classList.remove('on')); btn.classList.add('on');\n updateStageCount(si);\n evaluateFlow();\n}\nfunction stageFullyAnswered(si){return stageFullAll(si);}\nfunction revealUpTo(target){\n for(let i=0;i<=target;i++){const el=document.querySelector(`.stage-block[data-si=\"${i}\"]`);if(el&&el.classList.contains('locked')){el.classList.remove('locked');el.classList.add('reveal-in');}}\n revealedUpTo=Math.max(revealedUpTo,target);\n}\nfunction setFoot(show,label){document.getElementById('afoot').classList.toggle('show',show);if(label)document.getElementById('footbtn').textContent=label;}\nfunction showGap(si){\n const gc=document.getElementById('gapcard'),pc=Math.round(stageComplete(si)*100);\n document.getElementById('gcTitle').textContent='Your gap is at '+STAGES[si].n+' '+STAGES[si].name;\n document.getElementById('gcSub').textContent=STAGES[si].name+' is '+pc+'% complete, below the 70% readiness gate. This is where AI starts to stall. See your results now, or map the stages above to complete the picture.';\n gc.style.display='block';\n}\nfunction mapAbove(){mappedAll=true;document.getElementById('gapcard').style.display='none';evaluateFlow();}\nfunction evaluateFlow(){\n refresh();\n let frontier=0; while(frontier<STAGES.length && stageCleared(frontier)) frontier++;\n if(mappedAll){revealUpTo(STAGES.length-1);document.getElementById('gapcard').style.display='none';setFoot(true,'See where you land \\u2192');return;}\n revealUpTo(Math.min(frontier,STAGES.length-1));\n if(frontier>=STAGES.length){document.getElementById('gapcard').style.display='none';setFoot(true,'See your results \\u2192');}\n else if(stageFullyAnswered(frontier)&&!stageCleared(frontier)){showGap(frontier);setFoot(false);}\n else{document.getElementById('gapcard').style.display='none';setFoot(false);}\n}\nfunction answeredTotal(){let t=ansF.filter(x=>x!==null).length;units().forEach(u=>ansU[u].forEach(st=>{t+=st.filter(x=>x!==null).length;}));return t;}\nfunction buildStepper(){document.getElementById('pstep').innerHTML=STAGES.map((s,i)=>`<div class=\"ps\" data-i=\"${i}\" style=\"--ps-col:${s.color}\"><i><\u002Fi><\u002Fdiv>`).join('');}\nfunction stageComplete(si){const us=units();return us.reduce((a,u)=>a+uStageComplete(u,si),0)/us.length;}\nfunction stageCleared(si){return stageClearedAll(si);}\nfunction currentStage(){const us=units();let m=Infinity;us.forEach(u=>{m=Math.min(m,unitLevel(u));});return m===Infinity?-1:m;}\n\nfunction refresh(){\n STAGES.forEach((s,i)=>{const ps=document.querySelector(`#pstep .ps[data-i=\"${i}\"]`);if(ps){ps.classList.toggle('cleared',stageCleared(i));ps.querySelector('i').style.width=(stageComplete(i)*100)+'%';}});\n let fr=0;while(fr<STAGES.length&&stageCleared(fr))fr++;\n const pstage=document.getElementById('pstage');\n if(pstage)pstage.textContent=fr>=STAGES.length?('Complete \\u00b7 '+STAGES[STAGES.length-1].name):('Stage '+(fr+1)+' of '+STAGES.length+' \\u00b7 '+STAGES[fr].name);\n const cur=currentStage();\n const fs=document.getElementById('footstage'),fg=document.getElementById('footgap');\n if(cur<0){fs.textContent=\"Below the line, Ad Hoc\";fg.textContent=\"Foundation is the readiness gate\";}\n else{fs.textContent=STAGES[cur].n+\" \"+STAGES[cur].name;fg.textContent=cur>=VALUE_LINE?\"above the Otto value line\":(VALUE_LINE-cur)+\" stage\"+((VALUE_LINE-cur)>1?\"s\":\"\")+\" below the value line\";}\n}\n\nfunction show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}\nfunction restart(){ans=STAGES.map(()=>Array(5).fill(null));selectedBUs=[];show('track');}\n\n/* ===== RESULTS ===== */\nfunction recommend(cur){\n if(cur<VALUE_LINE) return {key:\"CE\",target:2};\n if(cur===VALUE_LINE) return {key:\"RS\",target:3};\n return {key:\"CBS\",target:4};\n}\nfunction showResults(){\n const cur=currentStage();\n const vc=cur<0?\"#F65275\":STAGES[cur].hex;\n document.documentElement.style.setProperty('--vc',vc);\n document.getElementById('rtrackpill').innerHTML=TRACK[track].label;\n const V=document.getElementById('verdict'),S=document.getElementById('rsub');\n const noun=TRACK[track].noun;\n if(cur<0){V.innerHTML=`Your ${noun} is <span class=\"hl\">below the line<\u002Fspan>. Foundation is the readiness gate.`;\n  S.textContent=\"AI on a stale platform amplifies bad answers. Before any capability goes live, the data, workflows and governance have to be in place. That is the work that turns the gap into value.\";}\n else if(cur<VALUE_LINE){V.innerHTML=`Foundation is in. The gap is the climb to <span class=\"hl\">Walk<\u002Fspan>.`;\n  S.textContent=\"You have cleared the readiness gate and AI is live somewhere. Value lands once it scales across \"+noun+\" on a shared model, the Walk stage, where the curve crosses the Otto value line.\";}\n else if(cur===VALUE_LINE){V.innerHTML=`You have crossed the <span class=\"hl\">Otto value line<\u002Fspan>.`;\n  S.textContent=\"AI is scaling with measurable gains. From here the work shifts from enablement to orchestration, agentic resolution with audit and oversight.\";}\n else if(cur===3){V.innerHTML=`Above the line and <span class=\"hl\">orchestrating<\u002Fspan>.`;\n  S.textContent=\"Agents 120,padR=34,padT=44,padB=92;\n const x0=padL,x1=W-padR,y0=H-padB,y1=padT,N=5;\n const ly=i=>y0-(y0-y1)*(i/(N-1));\n const units=ENT_UNITS,known=knownUnits();\n const n=units.length,slot=(x1-x0)/n,bw=Math.min(54,slot*0.46);\n const knownIdx=units.map((u,i)=>known.includes(u.code)?i:-1).filter(i=>i>=0);\n const oneKnown=knownIdx.length===1;\n const level=cur<0?0:cur, curHex=cur<0?'#F65275':STAGES[cur].hex;\n let s=`<defs>\\n  <linearGradient id=\"bug\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#F87CA9\"/><stop offset=\"1\" stop-color=\"#F65275\"/><\u002FlinearGradient>\\n  <linearGradient id=\"bugb\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#C7CDD8\"/><stop offset=\"1\" stop-color=\"#C7CDD8\" stop-opacity=\".5\"/><\u002FlinearGradient>\\n  <filter id=\"bgl\"><feGaussianBlur stdDeviation=\"5\" result=\"b\"/><feMerge><feMergeNode in=\"b\"/><feMergeNode in=\"SourceGraphic\"/><\u002FfeMerge><\u002Ffilter><\u002Fdefs>`;\n s+=`<rect x=\"${x0}\" y=\"${ly(N-1)-8}\" width=\"${x1-x0}\" height=\"${ly(VALUE_LINE)-(ly(N-1)-8)}\" fill=\"rgba(34,227,108,.07)\"/>`;\n for(let i=0;i<N;i++){s+=`<line x1=\"${x0}\" y1=\"${ly(i)}\" x2=\"${x1}\" y2=\"${ly(i)}\" stroke=\"rgba(4,14,61,.07)\"/>`;\n  s+=`<text x=\"${x0-16}\" y=\"${ly(i)+4}\" text-anchor=\"end\" fill=\"rgba(4,14,61,.55)\" font-family=\"DM Mono, monospace\" font-size=\"11\">${yLabels[i]}<\u002Ftext>`;}\n s+=`<line x1=\"${x0}\" y1=\"${ly(VALUE_LINE)}\" x2=\"${x1}\" y2=\"${ly(VALUE_LINE)}\" stroke=\"#22E36C\" stroke-width=\"1.5\" stroke-dasharray=\"5 6\" opacity=\".85\"/>`;\n s+=`<text x=\"${x1}\" y=\"${ly(VALUE_LINE)-9}\" text-anchor=\"end\" fill=\"#22E36C\" font-family=\"DM Mono, monospace\" font-size=\"11\" letter-spacing=\"1\">OTTO VALUE LINE \\u2191<\u002Ftext>`;\n const baseLevel=2.6;\n units.forEach((u,i)=>{\n  const cx=x0+slot*i+slot/2, bx=cx-bw/2, st=unitState(u.code);\n  if(st==='known'){\n   const ul=unitLevel(u.code), lvl=ul<0?0:ul, top=ly(lvl),h=Math.max(14,y0-top);\ lass=\"pl-note\">${note}<\u002Fdiv><\u002Fdiv>`;}).join('');\n}\nfunction topPriorities(){\n const list=[];const us=units();\n for(let si=0;si<STAGES.length;si++){const defs=CRIT[track][si];const scope=si===0?['_']:us;\n  scope.forEach(u=>{const arr=storeFor(si===0?'_':u,si);defs.forEach((c,ci)=>{const v=arr[ci];if(v===0||v===1)list.push({stage:si,stmt:c[0],val:v,unit:si===0?null:u,pillar:c[2]});});});}\n list.sort((a,b)=>a.val-b.val||a.stage-b.stage);\n return list.slice(0,3);\n}\nfunction buildPriorities(){\n const pr=topPriorities();const host=document.getElementById('priorities');\n if(!pr.length){host.innerHTML=`<div class=\"pri\"><div class=\"pn\">\\u2713<\u002Fdiv><div class=\"pc-body\"><div class=\"pc-stmt\">No gaps in what you scored. You are clearing every criterion you have answered, keep climbing the curve.<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;return;}\n host.innerHTML=pr.map((p,i)=>{const unitName=p.unit?ENT_UNITS.find(x=>x.code===p.unit).name+' \\u00b7 ':'';const lvl=p.val===0?'<span class=\"lvl no\">Not yet<\u002Fspan>':'<span class=\"lvl partly\">Partly<\u002Fspan>';const pm=PILLARS.find(x=>x.k===p.pillar)||{name:'',hex:'#8FFFDB'};const why={data:'AI reasons over your data, clean and aligned is the input it needs.',workflows:'This is where AI does the work; without it value stays theoretical.',ai:'The capability your people actually experience.',governance:'The guardrails that let you scale AI safely and prove it works.'}[p.pillar]||'';\n  return `<div class=\"pri\"><div class=\"pn\">${i+1}<\u002Fdiv><div class=\"pc-body\"><div class=\"pc-tag\"><span class=\"chip\" style=\"--cc:${pm.hex}\">${pm.name}<\u002Fspan>${unitName}${STAGES[p.stage].name} ${lvl}<\u002Fdiv><div class=\"pc-stmt\">${p.stmt}<\u002Fdiv><div class=\"pc-why\">${why}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;}).join('');\n}\nconst STAGE_UNLOCK=['A trusted platform AI can safely reason over.','Your first measurable AI win in one workflow.','AI scaled across the business, crossing the Otto value line.','Agents resolving multi-step work under governed oversight.','An autonomous enterprise that maintains and improves itself.'];\nfunction buildStageDetail(){\n const cur=currentStage();\n document.getElementById('stagesDetail').innerHTML=STAGES.map((s,i)=>{\n  const cl=i<=cur?'reached':(i===cur+1?'current':'ahead');\n  const badge=i<=cur?'Cleared':(i===cur+1?'Current':'Ahead');\n  const pc=Math.round(stageComplete(i)*100);\n  const layers=[['Now Assist',CAP[i].assist,'#2CB0CD'],['Agentic Workflows',CAP[i].act,'#6400EC'],['AI Control Tower',CAP[i].govern,'#15a06b']];\n  return `<div class=\"sd-card ${cl}\" style=\"--st:${s.hex}\"><div class=\"sd-head\"><span class=\"sd-num\">${s.n}<\u002Fspan><div class=\"sd-ti\"><div class=\"sd-name\">${s.name}<\u002Fdiv><div class=\"sd-goal\">${s.goal}<\u002Fdiv><\u002Fdiv><span class=\"sd-badge ${cl}\">${badge}${cl!=='ahead'?' \\u00b7 '+pc+'%':''}<\u002Fspan><\u002Fdiv><div class=\"sd-layers\">${layers.map(l=>`<div class=\"sd-layer\"><span class=\"sd-l-tag\" style=\"color:${l[2]}\">${l[0]}<\u002Fspan><p>${l[1]}<\u002Fp><\u002Fdiv>`).join('')}<\u002Fdiv><div class=\"sd-unlock\"><b>Unlocks<\u002Fb> ${STAGE_UNLOCK[i]}<\u002Fdiv><\u002Fdiv>`;\n }).join('');\n}\nfunction buildNextRung(){\n const cur=currentStage(), host=document.getElementById('nextRung');\n if(cur>=STAGES.length-1){host.innerHTML=`<div class=\"nr-card done\" style=\"--st:#22E36C\"><div><div class=\"nr-tag\">Leading edge<\u002Fdiv><div class=\"nr-title\">You have cleared every stage.<\u002Fdiv><div class=\"nr-sub\">Focus shifts from climbing to compounding: continuous optimisation, new use cases and measurable returns.<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;return;}\n const ns=cur+1, s=STAGES[ns], scope=ns===0?['_']:units(), seen={}, missing=[];\n CRIT[track][ns].forEach((c,ci)=>{scope.forEach(u=>{const v=storeFor(ns===0?'_':u,ns)[ci];if(v!==2){const un=ns===0?'':(units().length>1?ENT_UNITS.find(x=>x.code===u).name+': ':'');const key=un+c[0];if(!seen[key]){seen[key]=1;missing.push(un+c[0]);}}});});\n const list=missing.slice(0,6).map(m=>`<li>${m}<\u002Fli>`).join('')||'<li>All criteria in place, ready to advance.<\u002Fli>';\n host.innerHTML=`<div class=\"nr-card\" style=\"--st:${s.hex}\"><div class=\"nr-left\"><div class=\"nr-tag\">Do this next<\u002Fdiv><div class=\"nr-title\">${STAGE_UNLOCK[ns]}<\u002Fdiv><div class=\"nr-unlock\">This is the ${s.name} stage. Get every item on the right in place and you clear it.<\u002Fdiv><\u002Fdiv><div class=\"nr-right\"><div class=\"nr-h\">Put these in place<\u002Fdiv><ul class=\"nr-list\">${list}<\u002Ful><\u002Fdiv><\u002Fdiv>`;\n}\nfunction buildCapLadder(){\n const cur=currentStage();\n const rows=[['Now Assist','assist','#2CB0CD'],['Agentic Workflows','act','#6400EC'],['AI Control Tower','govern','#15a06b']];\n const short=t=>String(t);\n document.getElementById('capLadder').innerHTML=rows.map(r=>{\n  const nodes=STAGES.map((s,i)=>{const txt=CAP[i][r[1]];const na=/^not yet/i.test(txt.trim());let cls='cn';if(i<=cur)cls+=' on';else if(i===cur+1)cls+=' nx';else cls+=' ahead';if(na)cls+=' na';\n   return `<div class=\"${cls}\" style=\"--lc:${r[2]}\" title=\"${txt.replace(/\"/g,'&quot;')}\"><span class=\"cn-st\">${s.name}<\u002Fspan><span class=\"cn-tx\">${short(txt)}<\u002Fspan><\u002Fdiv>`;}).join('');\n  return `<div class=\"lane\"><div class=\"lane-head\"><span class=\"lane-lab\" style=\"color:${r[2]}\">${r[0]}<\u002Fspan><\u002Fdiv><div class=\"lane-track\">${nodes}<\u002Fdiv><\u002Fdiv>`;\n }).join('');\n}\nfunction buildImpact(cur,rec){\n const recName={CE:\"CoreEssentials\",RS:\"Core RunState\",CBS:\"CBS Delivery\"}[rec.key];\n const targetName=STAGES[rec.target]?STAGES[rec.target].name:\"Walk\";\n const fromName=cur<0?\"Ad Hoc\":STAGES[cur].name;\n document.getElementById('impactmove').innerHTML=`${fromName} &rarr; ${targetName} &middot; ${recName}`;\n const bu=(track==='B'&&selectedBUs.length)?selectedBUs.map(c=>ENT_UNITS.find(u=>u.code===c).name).join(' and '):TRACK[track].book;\n const cards=[\n  {nm:\"CoreEssentials\",mv:\"Foundation &rarr; Walk &middot; ~12 weeks\",price:\"from $100k &middot; all-inclusive\",match:rec.key===\"CE\",\n   d:`Fixed-price launch, the bridge across the Otto value line.`,b:[\"Center of Excellence stood up\",\"Platform configured and governed\",`${bu} live in 12 weeks`]},\n  {nm:\"Core RunState\",mv:\"Walk &rarr; Run &middot; 90-day cycles\",price:\"managed monthly\",match:rec.key===\"RS\",\n   d:\"A hybrid pod, governed by the CoE.\",b:[\"90-day outcome cycles\",\"Measurable productivity gains\",\"Scales AI across functions\"]},\n  {nm:\"CBS Delivery\",mv:\"Run &rarr; Fly &middot; bespoke\",price:\"scoped to outcome\",match:rec.key===\"CBS\",\n   d:\"Outcome-led automation across the enterprise.\",b:[\"Autonomous workforce\",\"Connected employee lifecycle\",\"Compounding business outcomes\"]},\n ];\n document.getElementById('bridge').innerHTML=cards.map(c=>`<div class=\"bcard ${c.match?'match':''}\">${c.match?'<span class=\"pill\">Recommended for you<\u002Fspan>':''}<div class=\"bn\">${c.nm}<\u002Fdiv><div class=\"bm\">${c.mv}<\u002Fdiv><div class=\"bp\">${c.price}<\u002Fdiv><div class=\"bd2\">${c.d}<\u002Fdiv><ul class=\"bullets\">${c.b.map(x=>`<li>${x}<\u002Fli>`).join('')}<\u002Ful><\u002Fdiv>`).join('');\n}\nfunction buildCTA(cur){\n const h=document.getElementById('ctah'),p=document.getElementById('ctap');\n if(cur<VALUE_LINE){h.textContent=\"Close the gap in twelve weeks.\";p.textContent=\"CoreEssentials takes you from where you are to the point where AI starts to pay. Let us walk through your result and map the climb.\";}\n else if(cur===VALUE_LINE){h.textContent=\"You are across the line. Now compound it.\";p.textContent=\"Core RunState matures what you have built into orchestrated, measurable outcomes on a 90-day cadence.\";}\n else{h.textContent=\"Push to autonomous.\";p.textContent=\"You are operating above the line. Let us talk about embedding AI across the remaining \"+TRACK[track].noun+\" and the commercial model that governs it.\";}\n}\n\n/* print capture */\nfunction openPrint(){document.getElementById('printmodal').classList.add('show');}\nfunction closePrint(){document.getElementById('printmodal').classList.remove('show');}\nfunction submitPrint(){\n const n=document.getElementById('f-name').value.trim(),e=document.getElementById('f-email').value.trim(),c=document.getElementById('f-company').value.trim();\n if(!n||!e||!c||!/.+@.+\\..+/.test(e)){alert(\"Please add your name, a valid work email, and company.\");return;}\n // TODO: POST {name,email,company,track,scores} to HubSpot form endpoint here\n closePrint(); setTimeout(()=>window.print(),200);\n}\n\nrefresh();\n/* hero curve draw-on */\n(function(){if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;const p=document.querySelector('.hero-curve path[stroke^=\"url\"]');if(!p)return;const len=p.getTotalLength();p.style.strokeDasharray=len;p.style.strokeDashoffset=len;p.style.transition='stroke-dashoffset 1.7s cubic-bezier(.2,0,0,1)';setTimeout(()=>{p.style.strokeDashoffset=0;},350);})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
